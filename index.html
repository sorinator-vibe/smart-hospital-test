  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nsform:translateY(-2px); }\n.ip-ic{ display:flex; width:34px; height:34px; border-radius:9px; align-items:center; justify-content:center; background:color-mix(in srgb, var(--c) 16%, transparent); margin-bottom:9px; }\n.ip-ic svg{ width:19px; height:19px; fill:none; stroke:var(--c); stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }\n.ip b{ display:block; font-size:13px; color:var(--txt); margin-bottom:5px; }\n.ip span{ font-size:10.5px; line-height:1.45; color:var(--txt-faint); }\n.info-bhag{ position:relative; border-radius:14px; padding:18px 20px 18px 22px; font-size:15px; line-height:1.6; color:#eaf3fb;\n  background:linear-gradient(110deg, rgba(53,194,255,0.12), rgba(139,123,240,0.1)); border:1px solid rgba(53,194,255,0.3); overflow:hidden; }\n.info-bhag::before{ content:\"\"; position:absolute; left:0; top:0; bottom:0; width:4px; background:linear-gradient(180deg,#35c2ff,#8b7bf0); }\n.info-bhag-tag{ display:block; font-family:var(--mono); font-size:10px; letter-spacing:1.8px; text-transform:uppercase; color:#5ad1e6; margin-bottom:7px; }\n.info-sign{ display:flex; align-items:center; gap:10px; margin-top:20px; font-size:13px; color:var(--txt-dim); font-style:italic; }\n.info-sign b{ font-style:normal; color:var(--txt); font-weight:600; letter-spacing:.3px; }\n.info-sign-l{ height:1px; width:34px; background:var(--edge-2); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <!-- 3D viewport -->\n  <canvas id=\"scene\"><\u002Fcanvas>\n  <div id=\"vignette\"><\u002Fdiv>\n  <!-- full-layout fire-drill wash -->\n  <div id=\"fireWash\" aria-hidden=\"true\">\n    <div class=\"fw-bar\"><span class=\"fw-dot\"><\u002Fspan>FIRE DRILL IN PROGRESS · FLEET HELD · EVACUATION ROUTES ACTIVE<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ HUD ============ -->\n  <div id=\"hud\">\n\n    <!-- top bar -->\n    <header id=\"topbar\">\n      <div class=\"brand\">\n        <span class=\"brand-mark\"><\u002Fspan>\n        <div class=\"brand-txt\">\n          <strong>ROBOTICS&nbsp;INTELLIGENCE&nbsp;PLATFORM<\u002Fstrong>\n          <span class=\"brand-sub\">Smart Hospital · Surgical Floor · Next-Gen Physical AI<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"view-toggle\" id=\"viewToggle\" role=\"tablist\" aria-label=\"Camera view\">\n        <button class=\"vt-btn active\" data-view=\"orbit\"><i data-ic=\"globe\"><\u002Fi>Bird's-eye<\u002Fbutton>\n        <button class=\"vt-btn\" data-view=\"walk\"><i data-ic=\"walk\"><\u002Fi>Street view<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"top-right\">\n        <div class=\"transport\" id=\"transport\">\n          <button class=\"tp-btn\" id=\"pauseBtn\" title=\"Pause / resume simulation (P)\" aria-label=\"Pause or resume\">\n            <svg class=\"tp-ic tp-ic-pause\" viewBox=\"0 0 24 24\"><rect x=\"7\" y=\"5.5\" width=\"3.6\" height=\"13\" rx=\"1.2\"><\u002Frect><rect x=\"13.4\" y=\"5.5\" width=\"3.6\" height=\"13\" rx=\"1.2\"><\u002Frect><\u002Fsvg>\n            <svg class=\"tp-ic tp-ic-play\" viewBox=\"0 0 24 24\"><path d=\"M7.5 5l11 7-11 7z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <div class=\"tp-rate\" title=\"Simulation speed\">\n            <input type=\"range\" id=\"rateSlider\" min=\"0.25\" max=\"2.5\" step=\"0.05\" value=\"1\">\n            <span id=\"rateVal\">1.0×<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"livedot\" id=\"liveState\"><span><\u002Fspan><em>LIVE<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"fire-drill\" id=\"fireDrill\" title=\"Fire drill — pause fleet &amp; sweep the floor (F)\" aria-pressed=\"false\">\n          <svg class=\"fd-ic\" viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M12 2.5c.6 3-1.8 4.2-1.8 6.4 0 1 .6 1.7 1.3 2 .1-1.2.8-2 1.5-2.6.3 1.9 2.3 2.7 2.3 5.1A4.4 4.4 0 0 1 12 21a4.4 4.4 0 0 1-4.4-4.4c0-3.3 2.7-4.4 2.4-8.1.9.5 1.6 1.3 2 2.3.6-2.6-.9-5.4 0-8.3z\"><\u002Fpath><\u002Fsvg>\n          <span class=\"fd-label\">Fire Drill<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"clock\" id=\"clock\">--:--<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- mode-aware navigation cues (sit under the view toggle) -->\n    <div id=\"viewCues\"><\u002Fdiv>\n    <!-- live 3-axis orientation gizmo -->\n    <div id=\"axisGizmo\" title=\"Orientation · drag to orbit\"><\u002Fdiv>\n\n    <!-- left tool rail -->\n    <nav id=\"rail\">\n      <button class=\"rail-btn\" data-panel=\"legend\" title=\"Legend\"><i data-ic=\"legend\"><\u002Fi><\u002Fbutton>\n      <button class=\"rail-btn\" data-panel=\"layers\" title=\"Layers &amp; overlays\"><i data-ic=\"layers\"><\u002Fi><\u002Fbutton>\n      <button class=\"rail-btn\" data-panel=\"ops\" title=\"Operational pane\"><i data-ic=\"ops\"><\u002Fi><\u002Fbutton>\n      <button class=\"rail-btn\" data-panel=\"care\" title=\"Human interactions\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M12 20.5S4.5 15 4.5 9.6A3.6 3.6 0 0 1 12 7.2a3.6 3.6 0 0 1 7.5 2.4c0 1.2-.5 2.4-1.3 3.5\"><\u002Fpath><path d=\"M11 13h2.2l1.3-2.4 1.8 4.2 1.1-1.8H21\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <button class=\"rail-btn\" data-panel=\"schedule\" title=\"OR schedule\"><i data-ic=\"cal\"><\u002Fi><\u002Fbutton>\n      <button class=\"rail-btn\" data-panel=\"minimap\" title=\"Mini-map\"><i data-ic=\"map\"><\u002Fi><\u002Fbutton>\n      <div class=\"rail-sep\"><\u002Fdiv>\n      <button class=\"rail-btn\" id=\"infoBtn\" title=\"The vision\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 16.5v-5\"><\u002Fpath><path d=\"M12 8.2v.01\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <button class=\"rail-btn\" id=\"homeBtn\" title=\"Reset view\"><i data-ic=\"home\"><\u002Fi><\u002Fbutton>\n    <\u002Fnav>\n\n    <!-- LEGEND -->\n    <section class=\"panel\" id=\"panel-legend\" data-side=\"left\">\n      <div class=\"panel-h\"><h3>Legend<\u002Fh3><button class=\"x\" data-close=\"legend\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"panel-b\" id=\"legendBody\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LAYERS -->\n    <section class=\"panel\" id=\"panel-layers\" data-side=\"left\">\n      <div class=\"panel-h\"><h3>Layers &amp; Overlays<\u002Fh3><button class=\"x\" data-close=\"layers\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"panel-b\" id=\"layersBody\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- OPERATIONS -->\n    <section class=\"panel\" id=\"panel-ops\" data-side=\"right\">\n      <div class=\"panel-h\"><h3>Operations<\u002Fh3><button class=\"x\" data-close=\"ops\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"panel-b\" id=\"opsBody\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HUMAN INTERACTIONS -->\n    <section class=\"panel\" id=\"panel-care\" data-side=\"right\">\n      <div class=\"panel-h\"><h3>Human Interactions<\u002Fh3><button class=\"x\" data-close=\"care\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"panel-b\" id=\"careBody\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CONVERSATION (care transcript) -->\n    <section class=\"panel convo\" id=\"panel-convo\" data-side=\"float\">\n      <div class=\"panel-h\">\n        <span class=\"insp-dot\" id=\"convoDot\"><\u002Fspan>\n        <h3 id=\"convoTitle\">Conversation<\u002Fh3>\n        <button class=\"x\" data-close=\"convo\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"panel-b\" id=\"convoBody\"><\u002Fdiv>\n      <div class=\"resize-grip\" title=\"Drag to resize\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- MINIMAP -->\n    <section class=\"panel\" id=\"panel-minimap\" data-side=\"left-bottom\">\n      <div class=\"panel-h\"><h3>Floor Map · L2<\u002Fh3><button class=\"x\" data-close=\"minimap\">×<\u002Fbutton><\u002Fdiv>\n      <div class=\"panel-b\"><div id=\"minimap\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SCHEDULE -->\n    <section class=\"panel\" id=\"panel-schedule\" data-side=\"bottom\">\n      <div class=\"panel-h\"><h3>OR Scheduling Timeline<\u002Fh3>\n        <div class=\"sched-legend\">\n          <span><i class=\"sw\" style=\"background:#3aa0ff\"><\u002Fi>Case<\u002Fspan>\n          <span><i class=\"sw\" style=\"background:#f4b740\"><\u002Fi>Turnover<\u002Fspan>\n          <span><i class=\"sw\" style=\"background:#7c8696\"><\u002Fi>Cleaning<\u002Fspan>\n          <span class=\"now-tag\">▮ now<\u002Fspan>\n        <\u002Fdiv>\n        <button class=\"x\" data-close=\"schedule\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"panel-b\" id=\"scheduleBody\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- room hover/focus chip -->\n    <div id=\"reticle\"><\u002Fdiv>\n\n    <!-- inspector popup (robots / carts / equipment) -->\n    <section class=\"panel inspect\" id=\"panel-inspect\" data-side=\"float\">\n      <div class=\"panel-h\" id=\"inspectHead\">\n        <span class=\"insp-dot\" id=\"inspDot\"><\u002Fspan>\n        <h3 id=\"inspectTitle\">Inspect<\u002Fh3>\n        <button class=\"x\" data-close=\"inspect\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"panel-b\" id=\"inspectBody\"><\u002Fdiv>\n      <div class=\"resize-grip\" title=\"Drag to resize\"><\u002Fdiv>\n    <\u002Fsection>\n    <div id=\"hint\">\n      <kbd>V<\u002Fkbd> bird's-eye / street · <kbd>scroll<\u002Fkbd> travel · <kbd>click floor<\u002Fkbd> move here · <kbd>+ −<\u002Fkbd> zoom · <kbd>drag<\u002Fkbd> look · <kbd>W A S D<\u002Fkbd> step · <kbd>C<\u002Fkbd> crouch\n    <\u002Fdiv>\n\n    <!-- stage-2 toast -->\n    <div id=\"toast\"><\u002Fdiv>\n\n    <!-- ============ VISION / INFO MODAL ============ -->\n    <div id=\"infoModal\" aria-hidden=\"true\" role=\"dialog\" aria-label=\"The vision\">\n      <div class=\"info-backdrop\" data-close-info=\"\"><\u002Fdiv>\n      <div class=\"info-card\">\n        <button class=\"info-x\" data-close-info=\"\" aria-label=\"Close\">×<\u002Fbutton>\n        <div class=\"info-hero\">\n          <svg class=\"info-orbit\" viewBox=\"0 0 280 168\" aria-hidden=\"true\">\n            <defs>\n              <radialGradient id=\"ioCore\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#bff0ff\"><\u002Fstop><stop offset=\"55%\" stop-color=\"#35c2ff\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#1f7fd0\"><\u002Fstop>\n              <\u002FradialGradient>\n            <\u002Fdefs>\n            <g class=\"io-rings\">\n              <ellipse cx=\"140\" cy=\"84\" rx=\"112\" ry=\"62\"><\u002Fellipse>\n              <ellipse cx=\"140\" cy=\"84\" rx=\"74\" ry=\"40\"><\u002Fellipse>\n            <\u002Fg>\n            <g class=\"io-spin\">\n              <g class=\"io-node\" style=\"--a:0\"><line x1=\"140\" y1=\"84\" x2=\"252\" y2=\"84\"><\u002Fline><circle cx=\"252\" cy=\"84\" r=\"5\"><\u002Fcircle><\u002Fg>\n              <g class=\"io-node\" style=\"--a:1\"><line x1=\"140\" y1=\"84\" x2=\"175\" y2=\"25\"><\u002Fline><circle cx=\"175\" cy=\"25\" r=\"5\"><\u002Fcircle><\u002Fg>\n              <g class=\"io-node\" style=\"--a:2\"><line x1=\"140\" y1=\"84\" x2=\"71\" y2=\"38\"><\u002Fline><circle cx=\"71\" cy=\"38\" r=\"5\"><\u002Fcircle><\u002Fg>\n              <g class=\"io-node\" style=\"--a:3\"><line x1=\"140\" y1=\"84\" x2=\"71\" y2=\"130\"><\u002Fline><circle cx=\"71\" cy=\"130\" r=\"5\"><\u002Fcircle><\u002Fg>\n              <g class=\"io-node\" style=\"--a:4\"><line x1=\"140\" y1=\"84\" x2=\"175\" y2=\"143\"><\u002Fline><circle cx=\"175\" cy=\"143\" r=\"5\"><\u002Fcircle><\u002Fg>\n            <\u002Fg>\n            <circle class=\"io-core\" cx=\"140\" cy=\"84\" r=\"17\" fill=\"url(#ioCore)\"><\u002Fcircle>\n            <g class=\"io-patient\">\n              <circle class=\"io-head\" cx=\"140\" cy=\"78.5\" r=\"4.7\"><\u002Fcircle>\n              <path class=\"io-body\" d=\"M131 93c0-5.3 4-8.8 9-8.8s9 3.5 9 8.8z\"><\u002Fpath>\n            <\u002Fg>\n          <\u002Fsvg>\n          <span class=\"info-eyebrow\">The North Star · our BHAG<\u002Fspan>\n          <h2 class=\"info-h\">A hospital that anticipates, orchestrates, and cares — where the needs of the patient come first, always.<\u002Fh2>\n        <\u002Fdiv>\n        <p class=\"info-lead\">We will build the world’s first <b>category-of-one smart hospital<\u002Fb>: not technology bolted onto care, but a single living system. The floor senses. The fleet responds. The intelligence reasons. The clinician connects. Care stops being a relay of hand-offs and becomes one seamless, anticipatory act — so no one waits, no one is confused, and no one feels alone.<\u002Fp>\n        <div class=\"info-pillars\">\n          <div class=\"ip\"><span class=\"ip-ic\" style=\"--c:#8b7bf0\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"7\" r=\"3.2\"><\u002Fcircle><path d=\"M5.5 20c0-4 3-6 6.5-6s6.5 2 6.5 6\"><\u002Fpath><\u002Fsvg><\u002Fspan><b>Humans<\u002Fb><span>Freed from the keyboard and the corridor — present for the moments only people can hold.<\u002Fspan><\u002Fdiv>\n          <div class=\"ip\"><span class=\"ip-ic\" style=\"--c:#35c2ff\"><svg viewBox=\"0 0 24 24\"><rect x=\"5\" y=\"8\" width=\"14\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M12 4.5v3\"><\u002Fpath><circle cx=\"12\" cy=\"4\" r=\"1\"><\u002Fcircle><path d=\"M9.5 13h.01M14.5 13h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan><b>Robots<\u002Fb><span>A tireless physical workforce that delivers, transports, and sits with patients.<\u002Fspan><\u002Fdiv>\n          <div class=\"ip\"><span class=\"ip-ic\" style=\"--c:#46c08a\"><svg viewBox=\"0 0 24 24\"><path d=\"M5 12a7 7 0 0114 0\"><\u002Fpath><path d=\"M8.2 12a3.8 3.8 0 017.6 0\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"1.5\"><\u002Fcircle><\u002Fsvg><\u002Fspan><b>Sensors &amp; IoT<\u002Fb><span>An ambient nervous system — rooms that are responsive, self-aware spaces.<\u002Fspan><\u002Fdiv>\n          <div class=\"ip\"><span class=\"ip-ic\" style=\"--c:#ff77c8\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 3l1.7 4.1L18 8.8l-4.3 1.7L12 15l-1.7-4.5L6 8.8l4.3-1.7z\"><\u002Fpath><circle cx=\"18\" cy=\"17\" r=\"1.4\"><\u002Fcircle><\u002Fsvg><\u002Fspan><b>AI agents<\u002Fb><span>Reasoning that orchestrates the fleet and answers with empathy — knowing when to hand off to a human.<\u002Fspan><\u002Fdiv>\n          <div class=\"ip\"><span class=\"ip-ic\" style=\"--c:#4f8cff\"><svg viewBox=\"0 0 24 24\"><rect x=\"5\" y=\"4\" width=\"14\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M9 9h6M9 12.5h6M9 16h3.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><b>Clinical systems<\u002Fb><span>Record, schedule, and orders unified and live — one source of truth that acts, not just stores.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"info-bhag\"><span class=\"info-bhag-tag\">The audacious goal<\u002Fspan>By 2030, take the wait, the confusion, and the loneliness out of the patient journey — and set the global standard every hospital is measured against. Not measured in tasks completed, but in fear removed and dignity returned.<\u002Fdiv>\n        <div class=\"info-sign\"><span class=\"info-sign-l\"><\u002Fspan>Authored by <b>Sorin<\u002Fb><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- bundler thumbnail (for offline export) -->\n  \n\n  <script src=\"4f9865ff-f6d6-45c7-a1f4-d6c0ef4ed4e2\"><\u002Fscript>\n  <script src=\"29f0c63a-0cd8-4e98-90a9-aaf9598ec062\"><\u002Fscript>\n  <script src=\"0da7269d-f279-4550-b2ea-75fa51658c34\"><\u002Fscript>\n  <script src=\"34736a1a-dae9-40b5-9cce-8b823b7141ec\"><\u002Fscript>\n  <script src=\"99e76fb2-68c7-4622-ac01-a0c436b37918\"><\u002Fscript>\n  <script src=\"775a5e17-2de8-4d76-bdcb-e532b0a190ea\"><\u002Fscript>\n  <script src=\"dc095270-e723-486e-8715-6353aeff1088\"><\u002Fscript>\n  <script src=\"020b546f-3240-44dc-a92b-2c42dfb397ce\"><\u002Fscript>\n  <script src=\"4fafc19f-f173-4bbc-809e-847293104895\"><\u002Fscript>\n  <script src=\"5e0b866d-d7be-43c3-a4a4-6800261b127e\"><\u002Fscript>\n  <script src=\"4f02b8ef-45b2-40fb-820a-1c2a2329022d\"><\u002Fscript>\n  <script src=\"7e3df3a0-43a8-48f2-bb7e-df881bfec059\"><\u002Fscript>\n  <script src=\"d40aa35b-6bd2-4a84-92a6-34c971
